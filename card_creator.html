<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soka Quote Card Creator</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2canvas CDN untuk convert HTML ke Image -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <!-- Google Fonts untuk variasi font -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@400;600;800&family=Playfair+Display:ital,wght@0,600;1,400&family=Plus+Jakarta+Sans:wght@500;700&family=Caveat:wght@600&family=Comfortaa:wght@600&family=DM+Serif+Display:ital@0;1&family=Montserrat:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
    
    <style>
        /* Font Bawaan */
        .font-inter { font-family: 'Inter', sans-serif; }
        .font-playfair { font-family: 'Playfair Display', serif; }
        .font-jakarta { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-cinzel { font-family: 'Cinzel', serif; }
        
        /* Tambahan Font */
        .font-caveat { font-family: 'Caveat', cursive; }
        .font-comfortaa { font-family: 'Comfortaa', cursive; }
        .font-dmserif { font-family: 'DM Serif Display', serif; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
        
        /* Paksa kontainer preview selalu 1:1 */
        .aspect-square-canvas {
            width: 500px;
            height: 500px;
        }
        @media (max-width: 640px) {
            .aspect-square-canvas {
                width: 100%;
                height: auto;
                aspect-ratio: 1 / 1;
            }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen">

    <!-- NAVBAR -->
    <nav class="bg-white shadow-sm border-b border-gray-200 py-4 px-6 mb-8">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <span class="text-xl font-black text-blue-950 tracking-wide">Soka Card Creator</span>
                <span class="bg-blue-100 text-blue-800 text-xs font-bold px-2.5 py-0.5 rounded-full">Rasio 1:1</span>
            </div>
            <a href="index.html" class="text-sm font-semibold text-gray-600 hover:text-blue-900 flex items-center gap-1">
                ← Kembali ke Beranda
            </a>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <main class="max-w-6xl mx-auto px-4 pb-12">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8 items-start">
            
            <!-- PANEL KONTROL (KIRI) -->
            <div class="lg:col-span-5 bg-white p-6 rounded-2xl shadow-sm border border-gray-200 space-y-6">
                <div class="flex justify-between items-center border-b pb-3">
                    <h2 class="text-lg font-bold text-gray-900">Pengaturan Kartu</h2>
                    <!-- TOMBOL RANDOMIZER -->
                    <button onclick="randomizeSettings()" class="inline-flex items-center space-x-1 bg-amber-50 hover:bg-amber-100 text-amber-800 border border-amber-200 px-3 py-1.5 rounded-lg text-xs font-bold transition shadow-sm">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.213 6H16" />
                        </svg>
                        <span>Desain Acak</span>
                    </button>
                </div>
                
                <!-- Kategori & Pilih Kutipan -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">1. Jenis Sumber</label>
                    <div class="flex bg-gray-100 p-1 rounded-lg mb-3">
                        <button onclick="changeSource('bimbingan')" id="src-bimbingan" class="w-full py-2 text-xs font-bold rounded-md bg-white text-blue-950 shadow-sm transition">Bimbingan</button>
                        <button onclick="changeSource('gosho')" id="src-gosho" class="w-full py-2 text-xs font-bold rounded-md text-gray-500 hover:text-gray-900 transition">Gosho</button>
                    </div>
                    
                    <label class="block text-sm font-bold text-gray-700 mb-2">2. Pilih Judul/Kutipan</label>
                    <select id="quote-select" onchange="loadSelectedQuote()" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2.5 text-sm focus:ring-blue-500 focus:border-blue-500 block">
                        <option>Memuat data dari Google Sheets...</option>
                    </select>
                </div>

                <!-- Custom Text Edit -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Edit Teks Manual (Opsional)</label>
                    <textarea id="custom-text" oninput="updatePreview()" rows="3" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm focus:ring-blue-500 focus:border-blue-500 block" placeholder="Sesuaikan teks isi kartu..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Edit Tokoh / Sumber Gosho</label>
                    <input type="text" id="custom-author" oninput="updatePreview()" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm focus:ring-blue-500 focus:border-blue-500 block">
                </div>

                <hr>

                <!-- Desain & Gaya -->
                <div class="space-y-4">
                    <h3 class="text-sm font-bold text-gray-900">Kustomisasi Desain</h3>
                    
                    <!-- Warna Background -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Warna Latar Belakang</label>
                        <div class="grid grid-cols-5 gap-2.5">
                            <button onclick="selectBgButton(0, '#002F6C', 'text-white')" class="bg-btn w-9 h-9 rounded-full bg-[#002F6C] border-2 border-transparent hover:scale-110 transition shadow-sm" title="Soka Blue"></button>
                            <button onclick="selectBgButton(1, '#C62828', 'text-white')" class="bg-btn w-9 h-9 rounded-full bg-[#C62828] border-2 border-transparent hover:scale-110 transition shadow-sm" title="Soka Red"></button>
                            <button onclick="selectBgButton(2, '#ffffff', 'text-gray-800')" class="bg-btn w-9 h-9 rounded-full bg-white border border-gray-300 hover:scale-110 transition shadow-sm" title="Pure White"></button>
                            <button onclick="selectBgButton(3, '#111827', 'text-gray-100')" class="bg-btn w-9 h-9 rounded-full bg-gray-900 border-2 border-transparent hover:scale-110 transition shadow-sm" title="Dark Mode"></button>
                            <button onclick="selectBgButton(4, '#FDFBF7', 'text-amber-950')" class="bg-btn w-9 h-9 rounded-full bg-[#FDFBF7] border border-amber-200 hover:scale-110 transition shadow-sm" title="Cream Vintage"></button>
                            
                            <button onclick="selectBgButton(5, '#E2ECE9', 'text-emerald-950')" class="bg-btn w-9 h-9 rounded-full bg-[#E2ECE9] border border-emerald-200/60 hover:scale-110 transition shadow-sm" title="Pastel Sage Green"></button>
                            <button onclick="selectBgButton(6, '#F3E1E1', 'text-rose-950')" class="bg-btn w-9 h-9 rounded-full bg-[#F3E1E1] border border-rose-200/60 hover:scale-110 transition shadow-sm" title="Pastel Dusty Rose"></button>
                            <button onclick="selectBgButton(7, '#E1EBF5', 'text-blue-950')" class="bg-btn w-9 h-9 rounded-full bg-[#E1EBF5] border border-blue-200/60 hover:scale-110 transition shadow-sm" title="Pastel Ocean Blue"></button>
                            <button onclick="selectBgButton(8, '#EAE6F3', 'text-purple-950')" class="bg-btn w-9 h-9 rounded-full bg-[#EAE6F3] border border-purple-200/60 hover:scale-110 transition shadow-sm" title="Pastel Soft Lavender"></button>
                            <button onclick="selectBgButton(9, '#F5EFE6', 'text-stone-800')" class="bg-btn w-9 h-9 rounded-full bg-[#F5EFE6] border border-stone-300/60 hover:scale-110 transition shadow-sm" title="Pastel Warm Sand"></button>
                        </div>
                    </div>

                    <!-- Pilihan Font -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Gaya Tulisan (Font)</label>
                        <select id="font-select" onchange="changeFont()" class="w-full bg-gray-50 border border-gray-300 rounded-lg p-2 text-sm focus:ring-blue-500 focus:border-blue-500">
                            <optgroup label="Serif (Formal & Elegan)">
                                <option value="font-playfair">Elegant Serif (Playfair)</option>
                                <option value="font-dmserif">Classic Bold Serif (DM Serif)</option>
                                <option value="font-cinzel">Classic Royal (Cinzel)</option>
                            </optgroup>
                            <optgroup label="Sans-Serif (Modern & Bersih)">
                                <option value="font-inter">Modern Minimalist (Inter)</option>
                                <option value="font-jakarta">Clean Corporate (Jakarta)</option>
                                <option value="font-montserrat">Editorial Medium (Montserrat)</option>
                                <option value="font-comfortaa">Soft Rounded (Comfortaa)</option>
                            </optgroup>
                            <optgroup label="Kreatif / Handwriting">
                                <option value="font-caveat">Aesthetic Handwriting (Caveat)</option>
                            </optgroup>
                        </select>
                    </div>

                    <!-- PENGATUR UKURAN FONT SLIDER -->
                    <div>
                        <div class="flex justify-between items-center mb-1">
                            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Ukuran Teks Isi</label>
                            <span id="font-size-val" class="text-xs font-bold text-blue-900 bg-blue-50 px-2 py-0.5 rounded">18px</span>
                        </div>
                        <input type="range" id="font-size-slider" min="12" max="28" value="18" oninput="changeFontSize(this.value)" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-900">
                    </div>

                    <!-- PENGATUR WATERMARK LOGO -->
                    <div class="border-t pt-4 mt-2 space-y-4">
                        <h4 class="text-xs font-bold text-gray-900 uppercase tracking-wider">Pengaturan Watermark Logo</h4>
                        
                        <!-- Slider Ukuran Logo -->
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Ukuran Logo</label>
                                <span id="logo-size-val" class="text-xs font-bold text-blue-900 bg-blue-50 px-2 py-0.5 rounded">200px</span>
                            </div>
                            <input type="range" id="logo-size-slider" min="50" max="450" value="200" oninput="changeLogoSize(this.value)" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-900">
                        </div>

                        <!-- Slider Opacity Logo -->
                        <div>
                            <div class="flex justify-between items-center mb-1">
                                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider">Transparansi (Opacity)</label>
                                <span id="logo-opacity-val" class="text-xs font-bold text-blue-900 bg-blue-50 px-2 py-0.5 rounded">15%</span>
                            </div>
                            <input type="range" id="logo-opacity-slider" min="0" max="100" value="15" oninput="changeLogoOpacity(this.value)" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-blue-900">
                        </div>
                    </div>

                    <!-- Aksesoris Tambahan -->
                    <div>
                        <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Aksesoris/Dekorasi</label>
                        <div class="space-y-2">
                            <label class="flex items-center text-sm font-medium text-gray-700 cursor-pointer">
                                <input type="checkbox" id="acc-tricolor" onchange="toggleAcc()" checked class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 mr-2">
                                Garis Triwarna Soka (Atas-Bawah)
                            </label>
                            <label class="flex items-center text-sm font-medium text-gray-700 cursor-pointer">
                                <input type="checkbox" id="acc-quotes" onchange="toggleAcc()" checked class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 mr-2">
                                Tanda Kutip Dekoratif (“ ”)
                            </label>
                        </div>
                    </div>
                </div>

                <!-- Tombol Cetak / Unduh -->
                <button onclick="downloadCard()" class="w-full bg-gradient-to-r from-blue-900 to-indigo-950 text-white font-bold py-3 px-4 rounded-xl shadow-md hover:from-blue-800 hover:to-indigo-900 transition flex items-center justify-center gap-2 mt-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                    </svg>
                    Unduh Gambar JPEG
                </button>
            </div>

            <!-- LIVE PREVIEW CANVAS (KANAN) -->
            <div class="lg:col-span-7 flex flex-col items-center justify-center">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2">Live Preview (Hasil Cetak)</span>
                
                <!-- Wadah Utama yang di-convert ke Image -->
                <div id="capture-area" class="aspect-square-canvas bg-[#002F6C] text-white flex flex-col justify-between p-10 relative overflow-hidden shadow-2xl rounded-lg transition-colors duration-300">
                    
                    <!-- ELEMEN LOGO WATERMARK BARU (Posisi Tengah Absolut) -->
                    <img id="preview-logo" src="sgilogo1.svg" alt="Logo Watermark" 
                         style="width: 200px; height: 200px; opacity: 0.15;" 
                         class="absolute inset-0 m-auto pointer-events-none select-none z-0 object-contain">

                    <!-- Aksesoris Triwarna Atas -->
                    <div id="preview-tricolor-top" class="absolute top-0 left-0 right-0 h-2 flex z-10">
                        <div class="bg-[#002F6C] flex-1"></div>
                        <div class="bg-[#F9A825] flex-1"></div>
                        <div class="bg-[#C62828] flex-1"></div>
                    </div>

                    <!-- Tanda Kutip Atas -->
                    <div id="preview-quote-start" class="text-5xl opacity-20 font-serif leading-none select-none -mb-4 z-10">“</div>

                    <!-- Tengah: Isi Teks Utama -->
                    <div class="my-auto text-center px-4 w-full overflow-hidden z-10">
                        <!-- Gaya ukuran font diatur inline style dari nilai default slider -->
                        <p id="preview-text" style="font-size: 18px;" class="font-medium leading-relaxed italic font-playfair break-words">
                            Memuat teks...
                        </p>
                        <p id="preview-author" class="text-xs font-bold tracking-wider uppercase mt-6 opacity-80">
                            -
                        </p>
                    </div>

                    <!-- Tanda Kutip Bawah -->
                    <div id="preview-quote-end" class="text-5xl opacity-20 font-serif leading-none select-none text-right -mt-4 z-10">”</div>

                    <!-- Watermark Identitas Komunitas -->
                    <div id="preview-watermark" class="text-center text-[10px] font-bold tracking-widest uppercase border-t pt-2 border-white/20 opacity-40 z-10">
                        Soka Gakkai Semarang
                    </div>

                    <!-- Aksesoris Triwarna Bawah -->
                    <div id="preview-tricolor-bottom" class="absolute bottom-0 left-0 right-0 h-2 flex z-10">
                        <div class="bg-[#002F6C] flex-1"></div>
                        <div class="bg-[#F9A825] flex-1"></div>
                        <div class="bg-[#C62828] flex-1"></div>
                    </div>
                </div>
                
                <p class="text-xs text-gray-500 mt-4 text-center">💡 Pojok gambar hasil unduhan otomatis siku rapi (1:1) tanpa noda bercak putih.</p>
            </div>

        </div>
    </main>

    <script>
        // === KONFIGURASI LINK GOOGLE SHEETS ===
        const CSV_URL_BIMBINGAN = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR5FZfLEBFeBOryYt_GzrzjTKh_XcTMtxwOIdW90VmhHTMFklcROcI4Mx8neJSUv6Kq9JZXMr82jiPL/pub?gid=0&single=true&output=csv";
        const CSV_URL_GOSHO = "https://docs.google.com/spreadsheets/d/e/2PACX-1vR5FZfLEBFeBOryYt_GzrzjTKh_XcTMtxwOIdW90VmhHTMFklcROcI4Mx8neJSUv6Kq9JZXMr82jiPL/pub?gid=138019442&single=true&output=csv";

        let quoteList = [];
        let goshoList = [];
        let currentActiveSource = 'bimbingan';
        
        // Data Palet Warna terstruktur untuk sistem tombol aktif & randomizer
        const bgPalettes = [
            { bg: '#002F6C', text: 'text-white' },
            { bg: '#C62828', text: 'text-white' },
            { bg: '#ffffff', text: 'text-gray-800' },
            { bg: '#111827', text: 'text-gray-100' },
            { bg: '#FDFBF7', text: 'text-amber-950' },
            { bg: '#E2ECE9', text: 'text-emerald-950' },
            { bg: '#F3E1E1', text: 'text-rose-950' },
            { bg: '#E1EBF5', text: 'text-blue-950' },
            { bg: '#EAE6F3', text: 'text-purple-950' },
            { bg: '#F5EFE6', text: 'text-stone-800' }
        ];
        let currentBgIndex = 0;

        function parseCSV(text) {
            const result = [];
            let row = ["", ""];
            let inQuotes = false;
            let colIndex = 0;
            let currentStr = "";
            const cleanText = text.replace(/\r/g, "");

            for (let i = 0; i < cleanText.length; i++) {
                let char = cleanText[i];
                let nextChar = cleanText[i + 1];

                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        currentStr += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    if (colIndex < 2) row[colIndex] = currentStr.trim();
                    currentStr = "";
                    colIndex++;
                } else if (char === '\n' && !inQuotes) {
                    if (colIndex < 2) row[colIndex] = currentStr.trim();
                    if (row[0] && row[0] !== "text" && row[0] !== '"text"') {
                        result.push({ text: row[0], author: row[1] || "Anonim" });
                    }
                    row = ["", ""];
                    colIndex = 0;
                    currentStr = "";
                } else {
                    currentStr += char;
                }
            }
            if (currentStr || colIndex > 0) {
                if (colIndex < 2) row[colIndex] = currentStr.trim();
                if (row[0] && row[0] !== "text" && row[0] !== '"text"') {
                    result.push({ text: row[0], author: row[1] || "Anonim" });
                }
            }
            return result;
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadQuotesFromSheets();
            updateBgButtonUI();
        });

        async function loadQuotesFromSheets() {
            try {
                const [resBimbingan, resGosho] = await Promise.all([
                    fetch(CSV_URL_BIMBINGAN).then(res => res.text()),
                    fetch(CSV_URL_GOSHO).then(res => res.text())
                ]);

                quoteList = parseCSV(resBimbingan);
                goshoList = parseCSV(resGosho);

                renderDropdownOptions();
                loadSelectedQuote();
            } catch (error) {
                console.error("Gagal mengambil data dari Google Sheets:", error);
                document.getElementById('quote-select').innerHTML = '<option>Gagal memuat data dari cloud.</option>';
            }
        }

        function renderDropdownOptions() {
            const selectEl = document.getElementById('quote-select');
            selectEl.innerHTML = '';
            const list = currentActiveSource === 'bimbingan' ? quoteList : goshoList;
            
            if (list.length === 0) {
                selectEl.innerHTML = '<option>Tidak ada data ditemukan.</option>';
                return;
            }

            list.forEach((item, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.text = `${index + 1}. ${item.text.substring(0, 45)}...`;
                selectEl.appendChild(option);
            });
        }

        function changeSource(type) {
            currentActiveSource = type;
            const btnBimbingan = document.getElementById('src-bimbingan');
            const btnGosho = document.getElementById('src-gosho');
            
            if(type === 'bimbingan') {
                btnBimbingan.className = "w-full py-2 text-xs font-bold rounded-md bg-white text-blue-950 shadow-sm transition";
                btnGosho.className = "w-full py-2 text-xs font-bold rounded-md text-gray-500 hover:text-gray-900 transition";
            } else {
                btnGosho.className = "w-full py-2 text-xs font-bold rounded-md bg-white text-blue-950 shadow-sm transition";
                btnBimbingan.className = "w-full py-2 text-xs font-bold rounded-md text-gray-500 hover:text-gray-900 transition";
            }
            renderDropdownOptions();
            loadSelectedQuote();
        }

        function loadSelectedQuote() {
            const index = document.getElementById('quote-select').value;
            const list = currentActiveSource === 'bimbingan' ? quoteList : goshoList;
            
            if(list[index]) {
                document.getElementById('custom-text').value = list[index].text;
                document.getElementById('custom-author').value = list[index].author;
                updatePreview();
            }
        }

        function updatePreview() {
            const prefix = currentActiveSource === 'gosho' ? 'Gosho: ' : '';
            document.getElementById('preview-text').innerText = document.getElementById('custom-text').value;
            document.getElementById('preview-author').innerText = "— " + prefix + document.getElementById('custom-author').value;
        }

        // Fungsi pemilihan warna terintegrasi indikator aktif
        function selectBgButton(index, bgColor, textColorClass) {
            currentBgIndex = index;
            const canvas = document.getElementById('capture-area');
            const watermark = document.getElementById('preview-watermark');
            
            canvas.className = "aspect-square-canvas flex flex-col justify-between p-10 relative overflow-hidden shadow-2xl rounded-lg transition-colors duration-300";
            canvas.classList.add(textColorClass);
            canvas.style.backgroundColor = bgColor;

            if(textColorClass.includes('white') || textColorClass.includes('gray-100')) {
                watermark.style.borderTopColor = "rgba(0, 0, 0, 0.15)";
            } else {
                watermark.style.borderTopColor = "rgba(255, 255, 255, 0.2)";
            }
            updateBgButtonUI();
        }

        function updateBgButtonUI() {
            const buttons = document.querySelectorAll('.bg-btn');
            buttons.forEach((btn, idx) => {
                if(idx === currentBgIndex) {
                    btn.classList.add('border-black', 'scale-110', 'ring-2', 'ring-offset-2', 'ring-blue-900');
                } else {
                    btn.classList.remove('border-black', 'scale-110', 'ring-2', 'ring-offset-2', 'ring-blue-900');
                }
            });
        }

        // Mengubah jenis Font tulisan
        function changeFont() {
            const fontSelected = document.getElementById('font-select').value;
            const textPreview = document.getElementById('preview-text');
            
            textPreview.classList.remove('font-playfair', 'font-inter', 'font-jakarta', 'font-cinzel', 'font-caveat', 'font-comfortaa', 'font-dmserif', 'font-montserrat', 'text-2xl', 'md:text-3xl');
            textPreview.classList.add(fontSelected);

            if(fontSelected === 'font-caveat') {
                textPreview.classList.add('text-2xl');
            }
        }

        // FUNGSI PENGUBAH UKURAN FONT DINAMIS
        function changeFontSize(size) {
            document.getElementById('font-size-val').innerText = size + "px";
            document.getElementById('preview-text').style.fontSize = size + "px";
        }

        // FUNGSI MENGUBAH UKURAN LOGO WATERMARK
        function changeLogoSize(size) {
            document.getElementById('logo-size-val').innerText = size + "px";
            const logo = document.getElementById('preview-logo');
            logo.style.width = size + "px";
            logo.style.height = size + "px";
        }

        // FUNGSI MENGUBAH OPACITY LOGO WATERMARK
        function changeLogoOpacity(opacityValue) {
            document.getElementById('logo-opacity-val').innerText = opacityValue + "%";
            document.getElementById('preview-logo').style.opacity = opacityValue / 100;
        }

        // Toggle aksesoris
        function toggleAcc() {
            const showTricolor = document.getElementById('acc-tricolor').checked;
            const showQuotes = document.getElementById('acc-quotes').checked;
            
            document.getElementById('preview-tricolor-top').style.display = showTricolor ? 'flex' : 'none';
            document.getElementById('preview-tricolor-bottom').style.display = showTricolor ? 'flex' : 'none';
            
            document.getElementById('preview-quote-start').style.opacity = showQuotes ? '0.2' : '0';
            document.getElementById('preview-quote-end').style.opacity = showQuotes ? '0.2' : '0';
        }

        // FUNGSI UTAMA RANDOMIZER (ACAK SETTINGAN)
        function randomizeSettings() {
            // 1. Acak Warna Latar Belakang
            const randomBgIdx = Math.floor(Math.random() * bgPalettes.length);
            const chosenPalette = bgPalettes[randomBgIdx];
            selectBgButton(randomBgIdx, chosenPalette.bg, chosenPalette.text);

            // 2. Acak Font dari opsi dropdown yang ada
            const fontSelect = document.getElementById('font-select');
            const fontOptions = fontSelect.querySelectorAll('option');
            const randomFontIdx = Math.floor(Math.random() * fontOptions.length);
            fontSelect.value = fontOptions[randomFontIdx].value;
            changeFont();

            // 3. Acak Ukuran Font (Rentang aman 15px - 22px untuk kestabilan visual)
            const randomSize = Math.floor(Math.random() * (22 - 15 + 1)) + 15;
            document.getElementById('font-size-slider').value = randomSize;
            changeFontSize(randomSize);

            // 4. Acak Ukuran Logo (Rentang aman 120px - 280px) dan Opacity (5% - 25%)
            const randomLogoSize = Math.floor(Math.random() * (280 - 120 + 1)) + 120;
            document.getElementById('logo-size-slider').value = randomLogoSize;
            changeLogoSize(randomLogoSize);

            const randomLogoOpacity = Math.floor(Math.random() * (25 - 5 + 1)) + 5;
            document.getElementById('logo-opacity-slider').value = randomLogoOpacity;
            changeLogoOpacity(randomLogoOpacity);

            // 5. Acak Aksesoris Dekorasi (Garis & Petik)
            const checkTricolor = document.getElementById('acc-tricolor');
            const checkQuotes = document.getElementById('acc-quotes');
            checkTricolor.checked = Math.random() > 0.2; // 80% peluang aktif
            checkQuotes.checked = Math.random() > 0.2;
            toggleAcc();
        }

        // PROSES UTAMA: DOWNLOAD HTML KE JPEG (SUDUT FIX SIKU-SIKU)
        function downloadCard() {
            const captureArea = document.getElementById('capture-area');
            
            // Trik Jitu: Sembunyikan efek rounded sementara waktu saat sistem memotret elemen
            captureArea.classList.remove('rounded-lg');
            
            html2canvas(captureArea, {
                scale: 3, 
                useCORS: true,
                logging: false,
                backgroundColor: null // Mencegah munculnya background putih di area luar foto
            }).then(canvas => {
                // Kembalikan efek melengkung di website live preview setelah potret selesai
                captureArea.classList.add('rounded-lg');

                const image = canvas.toDataURL("image/jpeg", 0.95);
                const link = document.createElement('a');
                link.download = `Soka_Quote_${Date.now()}.jpg`;
                link.href = image;
                link.click();
            }).catch(err => {
                captureArea.classList.add('rounded-lg');
                console.error("Gagal memproses gambar:", err);
            });
        }
    </script>
</body>
</html>
