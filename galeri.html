<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri - Soka Gakkai Semarang</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html { scroll-behavior: smooth; }
        .soka-tricolor { height: 4px; display: flex; width: 100%; }
        .soka-blue { background-color: #002F6C; flex: 1; }
        .soka-yellow { background-color: #F9A825; flex: 1; }
        .soka-red { background-color: #C62828; flex: 1; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen">

    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <span class="text-xl font-black text-blue-950">Soka Gakkai Semarang</span>
            <div class="space-x-4 font-semibold text-gray-600">
                <a href="index.html#beranda">Beranda</a>
                <a href="#" class="text-blue-900 border-b-2 border-blue-900">Galeri</a>
            </div>
        </div>
        <div class="soka-tricolor"><div class="soka-blue"></div><div class="soka-yellow"></div><div class="soka-red"></div></div>
    </nav>

    <main class="py-12 max-w-7xl mx-auto px-4">
        <div id="gallery-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-6 min-h-[500px]">
            </div>
        
        <div id="pagination" class="flex justify-center mt-12 space-x-2"></div>
    </main>

    <div id="zoom-modal" class="fixed inset-0 bg-black/90 z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300">
        <img id="modal-img" src="" class="max-w-[90%] max-h-[85vh] rounded-lg shadow-2xl">
    </div>

    <script>
        let semuaFoto = [];
        const perHalaman = 16; // 80 foto akan terbagi menjadi 5 halaman

        async function initGallery() {
            // Scanning otomatis
            for (let i = 1; i <= 999; i++) {
                const path = `images/foto${String(i).padStart(3, '0')}.webp`;
                try {
                    const res = await fetch(path, { method: 'HEAD' });
                    if (res.ok) {
                        semuaFoto.push(path);
                    } else if (i > 80 && i % 5 === 0) break; // Berhenti jika sudah lewat 80 dan tidak ketemu
                } catch (e) { break; }
            }
            render(1);
        }

        function render(page) {
            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = '';
            
            const start = (page - 1) * perHalaman;
            const end = start + perHalaman;
            const fotoTampil = semuaFoto.slice(start, end);

            fotoTampil.forEach(src => {
                const div = document.createElement('div');
                div.className = "aspect-video bg-gray-200 rounded-xl overflow-hidden cursor-pointer hover:shadow-lg transition-transform hover:scale-[1.02]";
                div.innerHTML = `<img src="${src}" loading="lazy" class="w-full h-full object-cover">`;
                div.onclick = () => {
                    document.getElementById('modal-img').src = src;
                    document.getElementById('zoom-modal').classList.remove('opacity-0', 'pointer-events-none');
                };
                grid.appendChild(div);
            });

            // Update tombol navigasi
            const pag = document.getElementById('pagination');
            pag.innerHTML = '';
            const totalPage = Math.ceil(semuaFoto.length / perHalaman);
            
            for(let i=1; i<=totalPage; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = `px-4 py-2 rounded-lg font-bold ${i === page ? 'bg-blue-900 text-white' : 'bg-white border border-gray-300'}`;
                btn.onclick = () => { render(i); window.scrollTo({top: 0, behavior: 'smooth'}); };
                pag.appendChild(btn);
            }
        }

        // Tutup modal
        document.getElementById('zoom-modal').onclick = (e) => {
            if(e.target.tagName !== 'IMG') document.getElementById('zoom-modal').classList.add('opacity-0', 'pointer-events-none');
        };

        window.onload = initGallery;
    </script>
</body>
</html>
